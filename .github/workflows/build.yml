name: Build APK (Signed)

on:
  push:
    paths:
      - "FluxoApp_v3.zip"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Instalar unzip + keytool
        run: sudo apt-get install -y unzip openjdk-17-jdk

      - name: 📂 Extrair ZIP
        run: |
          rm -rf app
          unzip -o FluxoApp_v3.zip -d app

      - name: 🔢 Gerar versão
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="v1.0.0.$COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Versão: $VERSION"

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔍 Encontrar keystore
        run: |
          KEYSTORE_PATH=$(find app -name "*.keystore" -o -name "*.jks" | head -n 1)
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
          echo "Keystore encontrada em: $KEYSTORE_PATH"

      - name: 🔑 Verificar keystore
        run: |
          echo "🔑 Verificando keystore..."
          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass fluxoapp123 \
            -alias fluxoapp | grep SHA
          echo "✅ Keystore válida"

      - name: 🛠️ Permissão Gradle
        run: chmod +x ./app/FluxoApp2/gradlew

      - name: 🔨 Build RELEASE ASSINADO
        working-directory: ./app/FluxoApp2
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=fluxoapp123 \
            -Pandroid.injected.signing.key.alias=fluxoapp \
            -Pandroid.injected.signing.key.password=fluxoapp123

      - name: 📦 Organizar APK
        run: |
          mkdir output
          APK_PATH=$(find app -name "*release*.apk" | head -n 1)
          cp "$APK_PATH" "output/FluxoApp-${VERSION}.apk"
          echo $VERSION > output/version.txt

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxoApp-release
          path: output/
