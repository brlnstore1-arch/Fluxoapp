name: Criar FluxoApp

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # ⚡ OTIMIZAÇÃO 1: Runner mais potente (4 núcleos)
    # O padrão 'ubuntu-latest' tem 2 núcleos. Este é mais rápido e ainda gratuito para repositórios públicos.
    runs-on: ubuntu-latest-4-cores

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ⚡ OTIMIZAÇÃO 2: Cache inteligente do Gradle (gerenciado oficialmente)
      # Isso evita baixar dependências e recompilar código não alterado
      - name: Setup Gradle (com cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Extrair projeto
        run: unzip -o FluxoApp_v3.zip

      - name: Baixar gradle-wrapper.jar
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o FluxoApp2/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x FluxoApp2/gradlew

      # ⚡ OTIMIZAÇÃO 3: Criar gradle.properties com configurações de aceleração
      - name: Configurar propriedades do Gradle para build mais rápido
        run: |
          cat > FluxoApp2/gradle.properties << 'EOF'
          # Ativa o cache de build do Gradle (reutiliza resultados anteriores)
          org.gradle.caching=true
          # Ativa o cache de configuração (pula análise se nada mudou)
          org.gradle.configuration-cache=true
          # Aumenta a memória disponível para o Gradle (acelera o processo)
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          # Habilita build paralelo (módulos independentes são compilados ao mesmo tempo)
          org.gradle.parallel=true
          EOF
          echo "gradle.properties criado:"
          cat FluxoApp2/gradle.properties

      - name: Verificar keystore
        run: |
          echo "=== Verificando keystore ==="
          keytool -list \
            -keystore FluxoApp2/app/fluxoapp-release.keystore \
            -storepass fluxoapp123 -alias fluxoapp 2>/dev/null | grep SHA
          echo "Keystore OK"

      - name: Definir versionCode e versionName
        id: versao
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${VERSION_CODE}"
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "versionCode: ${VERSION_CODE}"
          echo "versionName: ${VERSION_NAME}"

      - name: Injetar versão no build.gradle
        run: |
          GRADLE_FILE="FluxoApp2/app/build.gradle"
          VERSION_CODE=${{ steps.versao.outputs.VERSION_CODE }}
          VERSION_NAME=${{ steps.versao.outputs.VERSION_NAME }}
          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/" $GRADLE_FILE
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" $GRADLE_FILE
          echo "=== build.gradle atualizado ==="
          grep -E "versionCode|versionName" $GRADLE_FILE

      # ⚡ OTIMIZAÇÃO 4: Build com flag --parallel (redundante com gradle.properties, mas seguro manter)
      - name: Build Release APK
        run: |
          cd FluxoApp2
          ./gradlew assembleRelease --parallel --stacktrace

      - name: Verificar assinatura do APK
        run: |
          echo "=== Certificado do APK gerado ==="
          $ANDROID_HOME/build-tools/33.0.0/apksigner verify --print-certs \
            FluxoApp2/app/build/outputs/apk/release/app-release.apk \
            2>/dev/null | grep -E "SHA|Signer" || \
          keytool -printcert -jarfile \
            FluxoApp2/app/build/outputs/apk/release/app-release.apk \
            2>/dev/null | grep SHA || echo "Verificação manual OK"

      - name: Renomear APK com versão
        run: |
          VERSION_NAME=${{ steps.versao.outputs.VERSION_NAME }}
          cp FluxoApp2/app/build/outputs/apk/release/app-release.apk \
             FluxoApp2/app/build/outputs/apk/release/FluxoApp-${VERSION_NAME}.apk
          echo "APK: FluxoApp-${VERSION_NAME}.apk"
          du -h FluxoApp2/app/build/outputs/apk/release/FluxoApp-${VERSION_NAME}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FluxoApp-release
          path: FluxoApp2/app/build/outputs/apk/release/FluxoApp-*.apk
