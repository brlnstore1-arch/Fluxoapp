name: Build APK
on:
  push:
    branches: [ main, principal ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - run: unzip FluxoApp.zip
      - run: cd FluxoApp && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: FluxoApp-APK
          path: FluxoApp/app/build/outputs/apk/debug/app-debug.apk
