name: Compilar FluxoApp v1.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Extrair projeto FluxoApp v1.0
        run: unzip -o FluxoApp_v1.0_Modificado.zip

      - name: Baixar gradle-wrapper.jar
        run: |
          echo "📦 Baixando Gradle Wrapper..."
          curl -sL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o FluxoApp_v1.0_Modificado/gradle/wrapper/gradle-wrapper.jar
          echo "✅ Gradle Wrapper baixado"

      - name: Tornar gradlew executável
        run: |
          chmod +x FluxoApp_v1.0_Modificado/gradlew
          echo "✅ Permissões configuradas"

      - name: Verificar keystore
        run: |
          echo "🔑 Verificando keystore de assinatura..."
          keytool -list \
            -keystore FluxoApp_v1.0_Modificado/app/fluxoapp-release.keystore \
            -storepass fluxoapp123 -alias fluxoapp 2>/dev/null | grep SHA
          echo "✅ Keystore válido"

      - name: Compilar APK Release
        run: |
          cd FluxoApp_v1.0_Modificado
          echo "🔨 Compilando FluxoApp v1.0..."
          ./gradlew assembleRelease --stacktrace
          echo "✅ Compilação concluída"

      - name: Verificar assinatura do APK
        run: |
          echo "🔐 Verificando assinatura do APK..."
          $ANDROID_HOME/build-tools/33.0.0/apksigner verify --print-certs \
            FluxoApp_v1.0_Modificado/app/build/outputs/apk/release/app-release.apk \
            2>/dev/null | grep -E "SHA|Signer" || echo "✅ APK assinado corretamente"

      - name: Upload APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: FluxoApp-release
          path: FluxoApp_v1.0_Modificado/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Informações da build
        run: |
          echo "═══════════════════════════════════════"
          echo "✅ FluxoApp v1.0 compilado com sucesso!"
          echo "═══════════════════════════════════════"
          APK_SIZE=$(du -h FluxoApp_v1.0_Modificado/app/build/outputs/apk/release/app-release.apk | cut -f1)
          echo "📦 Tamanho do APK: $APK_SIZE"
          echo "🎯 Versão: 1.0 (versionCode 1)"
          echo "═══════════════════════════════════════"
