name: Build APK
on:
  push:
    branches: [ main, principal ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Unzip project
        run: unzip FluxoApp.zip

      - name: Build APK
        run: cd FluxoApp && gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FluxoApp-APK
          path: FluxoApp/app/build/outputs/apk/debug/app-debug.apk
